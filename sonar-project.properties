# =========================================================

# SonarCloud Project Configuration

# =========================================================

# === REQUIRED SETTINGS ===

sonar.projectKey=eli-iie_APDS7311-ST10389916-CustomerPortal
sonar.organization=eli-iie
sonar.host.url=https://sonarcloud.io

# === PROJECT INFO ===

sonar.projectName=Secure Customer International Payments Portal
sonar.projectVersion=1.0
sonar.projectDescription=APDS7311 ST10389916 Secure Customer International Payments Portal

# === SOURCE SETTINGS ===

sonar.sources=server,client
sonar.sourceEncoding=UTF-8

# === EXCLUSIONS ===

sonar.exclusions=
**/node_modules/**,
**/build/**,
**/dist/**,
**/coverage/**,
**/ssl/**,
**/*.test.js,
**/test/**,
**/scripts/**,
**/*test*.js,
**/*Test*.js,
**/seed*.js,
**/mock*.js,
**/debug*.js

