# SonarCloud Project Configuration

# This file defines the project properties for SonarCloud analysis

# =========================================================

# MANDATORY PROPERTIES

# =========================================================

sonar.projectKey=Na-Jastro_APDS7311-CustomerPortal-main
sonar.organization=na-jastro
sonar.host.url=https://sonarcloud.io

# =========================================================

# PROJECT INFORMATION

# =========================================================

sonar.projectName=Secure Customer International Payments Portal
sonar.projectVersion=1.0
sonar.projectDescription=APDS7311 ST10389916 Secure Customer International Payments Portal

# =========================================================

# SOURCE CODE CONFIGURATION

# =========================================================

sonar.sources=.
sonar.sourceEncoding=UTF-8

# =========================================================

# EXCLUSIONS

# =========================================================

sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/coverage/**,**/ssl/**,**/*.test.js,**/test/**,**/scripts/**,**/*test*.js,**/*Test*.js,**/seed*.js,**/mock*.js,**/debug*.js

# =========================================================

# COVERAGE REPORTS

# =========================================================

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# =========================================================

# QUALITY GATE SETTINGS

# =========================================================

sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# =========================================================

# COVERAGE EXCLUSIONS

# =========================================================

sonar.coverage.exclusions=**/test/**,**/*.test.js,**/ssl/**,**/scripts/**,**/build/**,**/dist/**

# =========================================================

# CPD EXCLUSIONS

# =========================================================

sonar.cpd.exclusions=**/node_modules/**,**/dist/**,**/build/**

# =========================================================

# BRANCH SETTINGS

# =========================================================

sonar.branch.name=main
